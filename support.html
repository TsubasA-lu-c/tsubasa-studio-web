<!DOCTYPE html>
<html lang="ja">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サポート - マイチケット</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #FFFFFF;
      color: #111111;
      line-height: 1.8;

    .container {
      max-width: 640px;

      border: 1px solid #E0E0E0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
    }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #111111; line-height: 1.8; }
    a { color: #1E88E5; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #888888;
      text-align: center;
    }
  </style>

<body>
  <div class="container">
    <p class="app-name">マイチケット</p>
    <h1>サポート</h1>

    <div class="card">

      <p>ご質問・不具合報告・ご要望は下記メールアドレスまでご連絡ください。<br>
      <a href="mailto:tsubasa.app.studio@gmail.com">tsubasa.app.studio@gmail.com</a></p>
    </div>

    <div class="card">

      対応アーティストは順次追加予定です。追加リクエストはお問い合わせからご連絡ください。</p>
    </div>

    <div class="card">

    </div>

    <div class="card">

      <p><a href="privacy.html">プライバシーポリシーはこちら</a></p>

    <p class="footer">Tsubasa Studio</p>
